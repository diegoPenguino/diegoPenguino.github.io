<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camp 2026 - Full IOI Rankings</title>
  <style>
    :root {
      --bg-deep: #071429;
      --bg-mid: #102747;
      --panel: rgba(7, 20, 41, 0.82);
      --line: rgba(169, 185, 210, 0.25);
      --text-main: #eef4ff;
      --text-soft: #bed0ee;
      --accent: #f3c85f;
      --rank-pill: #1a3a66;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", Tahoma, sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 8% 12%, rgba(243, 200, 95, 0.22), transparent 26%),
        radial-gradient(circle at 88% 20%, rgba(128, 176, 255, 0.20), transparent 28%),
        radial-gradient(circle at 52% 88%, rgba(80, 120, 190, 0.20), transparent 30%),
        linear-gradient(165deg, var(--bg-deep), var(--bg-mid));
      padding: 28px 18px 42px;
    }

    .wrapper {
      max-width: 1300px;
      margin: 0 auto;
      animation: pageReveal 680ms ease-out both;
    }

    .hero {
      border: 1px solid var(--line);
      background: linear-gradient(140deg, rgba(10, 24, 49, 0.95), rgba(14, 36, 70, 0.88));
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 20px 38px rgba(1, 8, 18, 0.4);
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -90px;
      top: -110px;
      width: 280px;
      height: 280px;
      background: radial-gradient(circle, rgba(243, 200, 95, 0.25), transparent 68%);
      pointer-events: none;
    }

    .kicker {
      margin: 0;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      color: var(--text-soft);
      font-size: 0.76rem;
      font-weight: 600;
    }

    h1 {
      margin: 8px 0 8px;
      font-size: clamp(1.5rem, 2.6vw, 2.2rem);
      font-family: Georgia, "Times New Roman", serif;
      color: #fff7e7;
    }

    .subtitle {
      margin: 0;
      color: var(--text-soft);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .controls {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }

    .controls label {
      font-size: 0.8rem;
      color: #d4e1f7;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 700;
    }

    select {
      appearance: none;
      border: 1px solid rgba(169, 185, 210, 0.4);
      background: linear-gradient(145deg, rgba(11, 29, 56, 0.95), rgba(16, 42, 79, 0.95));
      color: #f3f8ff;
      border-radius: 12px;
      padding: 10px 14px;
      min-width: 280px;
      font-size: 0.95rem;
      font-weight: 600;
      outline: none;
      box-shadow: 0 8px 22px rgba(2, 10, 25, 0.35);
    }

    select option {
      color: #0f1c33;
      background: #f3f8ff;
    }

    select option:checked {
      color: #071429;
      background: #f3c85f;
    }

    select:focus {
      border-color: rgba(243, 200, 95, 0.8);
      box-shadow: 0 0 0 3px rgba(243, 200, 95, 0.2);
    }

    .board {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 18px 32px rgba(2, 10, 25, 0.35);
      margin-top: 18px;
      animation: staggerIn 420ms ease both;
    }

    .board-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(13, 29, 57, 0.94), rgba(13, 41, 83, 0.94));
    }

    .board h2 {
      margin: 0;
      font-size: 1.1rem;
      color: #fff8e8;
      font-family: Georgia, "Times New Roman", serif;
    }

    .badge {
      font-size: 0.74rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #162a4b;
      background: var(--accent);
      border-radius: 999px;
      padding: 6px 10px;
      font-weight: 700;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 1;
      font-size: 0.75rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #c6d6f3;
      background: rgba(16, 39, 71, 0.98);
      border-bottom: 1px solid var(--line);
      padding: 10px 8px;
      text-align: right;
      white-space: nowrap;
    }

    thead th.player-col,
    thead th.user-col {
      text-align: left;
    }

    tbody td {
      border-bottom: 1px solid rgba(190, 208, 238, 0.12);
      padding: 9px 8px;
      text-align: right;
      font-size: 0.9rem;
      color: #eff5ff;
      white-space: nowrap;
    }

    tbody tr:last-child td {
      border-bottom: 0;
    }

    tbody tr:hover {
      background: rgba(68, 114, 178, 0.16);
    }

    td.player-col,
    td.user-col {
      text-align: left;
      font-weight: 600;
    }

    td.rank-col {
      text-align: center;
      width: 64px;
    }

    .rank-pill {
      display: inline-block;
      min-width: 34px;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 0.78rem;
      font-weight: 700;
      background: var(--rank-pill);
      color: #dce8ff;
    }

    tbody tr.medal-gold {
      background: linear-gradient(90deg, rgba(242, 207, 104, 0.30), rgba(10, 24, 49, 0.15));
    }

    tbody tr.medal-silver {
      background: linear-gradient(90deg, rgba(201, 206, 216, 0.24), rgba(10, 24, 49, 0.10));
    }

    tbody tr.medal-bronze {
      background: linear-gradient(90deg, rgba(201, 150, 95, 0.26), rgba(10, 24, 49, 0.10));
    }

    .global {
      font-weight: 800;
      color: #fff5d8;
    }

    .footer-note {
      margin-top: 14px;
      color: #aec2e6;
      font-size: 0.85rem;
      text-align: right;
    }

    @keyframes pageReveal {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes staggerIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 720px) {
      body {
        padding: 16px 10px 28px;
      }

      .hero {
        padding: 18px 14px;
      }

      select {
        min-width: 100%;
      }

      table {
        min-width: 900px;
      }
    }
  </style>
</head>

          { username: "user13", user: "Janine", libross: 0, potencia: 0, dibujo: 0, presupuesto: 0, frecuencias: 0, torneo: 0, dragon: 0, magicians: 0, Global: 0 },
          { username: "user22", user: "Caleb", libross: 0, potencia: 0, dibujo: 0, presupuesto: 0, frecuencias: 0, torneo: 0, dragon: 0, magicians: 0, Global: 0 },
          { username: "user26", user: "Antony", libross: 0, potencia: 0, dibujo: 0, presupuesto: 0, frecuencias: 0, torneo: 0, dragon: 0, magicians: 0, Global: 0 }
        ]
      }
    };

    function sortRanking(rows, tasks) {
      return [...rows].sort((a, b) => {
        if (b.Global !== a.Global) return b.Global - a.Global;

        for (const task of tasks) {
          if (b[task] !== a[task]) return b[task] - a[task];
        }

        return a.username.localeCompare(b.username);
      });
    }

    function renderBoard(key) {
      const root = document.getElementById("board-root");
      const ranking = rankings[key];
      const sorted = sortRanking(ranking.data, ranking.taskColumns);

      root.innerHTML = `
        <section class="board">
          <div class="board-header">
            <h2>${ranking.title}</h2>
            <span class="badge">${ranking.badge}</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Rank</th>
                  <th class="player-col">Username</th>
                  <th class="user-col">User</th>
                  ${ranking.taskColumns.map(task => `<th>${task}</th>`).join("")}
                  <th>Global</th>
                </tr>
              </thead>
              <tbody>
                ${sorted.map((row, idx) => {
                  const medalClass = idx === 0
                    ? "medal-gold"
                    : idx === 1
                      ? "medal-silver"
                      : idx === 2
                        ? "medal-bronze"
                        : "";

                  return `
                    <tr class="${medalClass}">
                      <td class="rank-col"><span class="rank-pill">${idx + 1}</span></td>
                      <td class="player-col">${row.username}</td>
                      <td class="user-col">${row.user}</td>
                      ${ranking.taskColumns.map(task => `<td>${row[task].toFixed(1)}</td>`).join("")}
                      <td class="global">${row.Global.toFixed(1)}</td>
                    </tr>
                  `;
                }).join("")}
              </tbody>
            </table>
          </div>
        </section>
      `;
    }

    const select = document.getElementById("ranking-select");
    select.addEventListener("change", (event) => {
      renderBoard(event.target.value);
    });

    renderBoard(select.value);
  </script>
</body>
</html>
